AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  questrade-lunchmoney-sync

  Serverless application to sync Questrade investment balances to Lunch Money

Parameters:
  LunchMoneyApiToken:
    Type: String
    Description: Lunch Money API access token
    NoEcho: true

  SyncDaysBack:
    Type: Number
    Description: Number of days to look back when syncing (max 31)
    Default: 31
    MinValue: 1
    MaxValue: 31

  SyncSchedule:
    Type: String
    Description: CloudWatch Events schedule expression (cron or rate)
    Default: "cron(0 8 ? * * *)"
    # Default: Daily at 8 AM UTC (? in day-of-month means "any")

  LogRetentionDays:
    Type: Number
    Description: Number of days to retain CloudWatch logs
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

  QuestradeParameterName:
    Type: String
    Description: SSM Parameter Store path for Questrade account configurations
    Default: "/questrade-lunchmoney/account-configs"

Globals:
  Function:
    Timeout: 300
    MemorySize: 256
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        LUNCHMONEY_API_TOKEN: !Ref LunchMoneyApiToken
        SYNC_DAYS_BACK: !Ref SyncDaysBack
        QUESTRADE_PARAMETER_NAME: !Ref QuestradeParameterName

Resources:
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: questrade-lunchmoney-sync
      CodeUri: .
      Handler: src.lambda_handler.handler
      Description: Syncs Questrade investment balances to Lunch Money
      Events:
        ScheduledSync:
          Type: Schedule
          Properties:
            Schedule: !Ref SyncSchedule
            Name: questrade-lunchmoney-sync-schedule
            Description: Trigger sync on a schedule
            Enabled: true
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/questrade-lunchmoney-sync:*"
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${QuestradeParameterName}"
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/aws/ssm"
      Tags:
        Application: questrade-lunchmoney-sync
        Environment: production

  SyncFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${SyncFunction}'
      RetentionInDays: !Ref LogRetentionDays

  ErrorNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: questrade-lunchmoney-sync-errors
      DisplayName: Questrade-LunchMoney Sync Errors
      Tags:
        - Key: Application
          Value: questrade-lunchmoney-sync

  SyncFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: questrade-lunchmoney-sync-errors
      AlarmDescription: Alert when sync function encounters errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncFunction
      AlarmActions:
        - !Ref ErrorNotificationTopic
      TreatMissingData: notBreaching

  SyncFunctionDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: questrade-lunchmoney-sync-duration
      AlarmDescription: Alert when sync function takes too long
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 240000  # 4 minutes (function timeout is 5 minutes)
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SyncFunction
      AlarmActions:
        - !Ref ErrorNotificationTopic
      TreatMissingData: notBreaching

Outputs:
  SyncFunction:
    Description: Sync Lambda Function ARN
    Value: !GetAtt SyncFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SyncFunctionArn'

  SyncFunctionIamRole:
    Description: Implicit IAM Role created for Sync function
    Value: !GetAtt SyncFunctionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SyncFunctionRoleArn'

  SyncSchedule:
    Description: CloudWatch Events Rule for scheduled sync
    Value: !Ref SyncSchedule
    Export:
      Name: !Sub '${AWS::StackName}-SyncSchedule'

  ErrorNotificationTopicArn:
    Description: SNS Topic ARN for error notifications
    Value: !Ref ErrorNotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-ErrorNotificationTopicArn'

  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref SyncFunctionLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroupName'

  QuestradeParameterName:
    Description: SSM Parameter Store path for Questrade account configs
    Value: !Ref QuestradeParameterName
    Export:
      Name: !Sub '${AWS::StackName}-QuestradeParameterName'
